<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Ejercicio 6 - Alternar contenido</title>
  <style>
    /* La clase "oculto" es la única responsable de esconder el elemento.
       El JS solo agrega o quita esta clase; nunca toca display directamente. */
    .oculto  { display: none; }
    .tarjeta { background: #f0f0f0; padding: 16px;
                border-radius: 8px; margin-bottom: 12px; }
  </style>
</head>
<body>
  <!-- Tarjeta que se muestra u oculta con el botón -->
  <div class="tarjeta" id="tarjeta">
    <h3>Informacion importante</h3>
    <p>Este contenido puede mostrarse u ocultarse con el boton.</p>
  </div>

  <button id="btnToggle">Ocultar</button>

  <script src="ej6.js"></script>
</body>
</html>
